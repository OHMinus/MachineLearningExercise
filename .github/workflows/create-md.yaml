name: Create Missing Markdown Files

on:
  push:
    paths:
      - '**.pdf' # PDFファイルが追加・変更された時に実行
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check-and-create:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y poppler-utils

      - name: Create and parse PDF to Markdown
        run: |
          find . -name "*.pdf" | while read pdf_file; do
            base_name="${pdf_file%.pdf}"
            md_file="${base_name}.md"

            if [ ! -f "$md_file" ]; then
              echo "Parsing $pdf_file to $md_file"
              # pdftotextを使用してレイアウトを保持しつつMarkdown形式へ
              # -layoutオプションで視覚的な配置を維持
              pdftotext -layout "$pdf_file" - | sed 's/^/  /' > "$md_file"
              
              # 先頭にYAMLフロントマターを追記
              echo -e "---\ntitle: $(basename "$base_name")\ndate: $(date +'%Y-%m-%d')\n---\n$(cat "$md_file")" > "$md_file"
            fi
          done

      - name: Commit and push if files were created
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # 新しく作成された可能性のあるMarkdownファイルをすべて追加
          git add ./**/*.md
          
          # 変更があるか確認（変更がない場合はコミットをスキップ）
          if ! git diff --cached --quiet; then
            git commit -m "Auto-create missing markdown files for PDFs"
            git push
          else
            echo "No new markdown files to create."
          fi